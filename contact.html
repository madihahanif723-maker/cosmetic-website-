<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Cosmetic Sparkle</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg glass-nav sticky-top">
        <div class="container">
            <a class="navbar-brand logo-text" href="index.html">Cosmetic Sparkle ✨</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="product.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="contact.html">Contact</a>
                    </li>
                </ul>
                <span class="badge assignment-badge ms-lg-3">Promise & Fetch API</span>
            </div>
        </div>
    </nav>

    <nav class="container py-5 mt-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card glass-contact-card p-4 p-md-5 shadow border border-white">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-dark mb-2">Get In Touch 💌</h2>
                        <p class="text-secondary small">Have questions about our products or assignments? Drop us a message!</p>
                    </div>

                    <form id="cosmeticContactForm" onsubmit="handleContactSubmit(event)">
                        <div class="mb-3">
                            <label for="userName" class="form-label custom-label">Full Name</label>
                            <input type="text" class="form-control glass-input" id="userName" placeholder="Madiha Hanif" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="userEmail" class="form-label custom-label">Email Address</label>
                            <input type="email" class="form-control glass-input" id="userEmail" placeholder="name@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="userSubject" class="form-label custom-label">Subject</label>
                            <input type="text" class="form-control glass-input" id="userSubject" placeholder="Order Inquiry / Feedback" required>
                        </div>

                        <div class="mb-3">
                            <label for="userMessage" class="form-label custom-label">Your Message</label>
                            <textarea class="form-control glass-input" id="userMessage" rows="4" placeholder="Write your gorgeous message here..." required></textarea>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn cta-btn text-white py-2.5 rounded-3 shadow fw-semibold">
                                Send Message ✨
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <footer class="py-4 text-center text-muted border-top bg-light-glass mt-5">
        <div class="container">
            <p class="mb-0">© 2026 Cosmetic Sparkle | Powered by Live Fetch API & Glassmorphism Design</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        function handleContactSubmit(event) {
            event.preventDefault(); 
            const name = document.getElementById('userName').value;

            Swal.fire({
                title: `Thank You, ${name}!`,
                text: 'Your message has been successfully transmitted via JavaScript event handler.',
                icon: 'success',
                confirmButtonColor: '#db2777',
                background: 'rgba(255, 255, 255, 0.95)'
            }).then(() => {
                document.getElementById('cosmeticContactForm').reset();
            });
        }
    </script>
</body>
</html>
